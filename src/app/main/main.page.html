<ion-header [translucent]="true">
  <ion-toolbar>
      <div class="logo/container">
        <img 
        src="assets/images/LogoTitulo.png"
        alt="La Olla Arequipeña">
      </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      
      <div class="logo/container">
        <img 
        src="assets/images/LogoTitulo.png"
        alt="La Olla Arequipeña">
      </div>

    </ion-toolbar>
  </ion-header>

 <ion-content class="ion-padding">
  
  <div class="menu-botones">

    <ion-button class="btn-naranja" expand="block" routerLink="/menu">
      Ver Menú
    </ion-button>

    <ion-button class="btn-naranja" expand="block" routerLink="/productos">
      CARRITO DE PEDIDOS
    </ion-button>

    <ion-button class="btn-naranja" expand="block" routerLink="/login">
      Cerrar Sesión
    </ion-button>

  </div>

  <div class="imagen-inferior">
    <img
      src="assets/images/promocion.png"
      alt="Promoción">
  </div>

</ion-content>
