<ion-header>

  <ion-toolbar>

    <ion-title>
      Productos Seleccionados
    </ion-title>

  </ion-toolbar>

</ion-header>

<ion-content class="ion-padding">

  <ion-list>

    <ion-item
      *ngFor="
      let producto of productosService.obtenerProductos();
      let i = index">

      <ion-label>

        <h2>
          {{ producto.nombre }}
        </h2>

        <p>
          Cantidad: {{ producto.cantidad }}
        </p>

        <p>
          S/. {{ producto.precio }}
        </p>

      </ion-label>

      <ion-button
        color="danger"
        (click)="productosService.eliminar(i)">

        Eliminar

      </ion-button>

    </ion-item>

  </ion-list>

</ion-content>
