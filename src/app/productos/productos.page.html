<ion-header>
  <ion-toolbar>
    <ion-title>Productos Seleccionados</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <!-- Si el carrito está vacío -->
  <div
    class="carrito-vacio"
    *ngIf="productosService.obtenerProductos().length === 0">

    <h2>🛒 Carrito vacío</h2>

    <p>
      Aún no has agregado ningún producto.
    </p>

    <ion-button
      expand="block"
      routerLink="/menu">

      Ir a la carta

    </ion-button>

    <ion-button
      expand="block"
      fill="outline"
      routerLink="/main">

      Volver al inicio

    </ion-button>

  </div>

  <!-- Si existen productos -->
  <ion-list
    *ngIf="productosService.obtenerProductos().length > 0">

    <ion-item
      *ngFor="
      let producto of productosService.obtenerProductos();
      let i = index">

      <ion-label>

        <h2>{{ producto.nombre }}</h2>

        <p>Cantidad: {{ producto.cantidad }}</p>

        <p>Precio: S/. {{ producto.precio }}</p>

      </ion-label>

      <ion-button
        color="danger"
        (click)="productosService.eliminar(i)">

        Eliminar

      </ion-button>

    </ion-item>

  </ion-list>

</ion-content>
